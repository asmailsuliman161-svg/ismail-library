<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مكتبة إسماعيل سليمان حسن</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background-color: #eef2f7;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #0d6efd;
        }

        img {
            border-radius: 50%;
            margin: 20px 0;
        }

        .book {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        a {
            text-decoration: none;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>مرحبًا بكم في مكتبة إسماعيل سليمان حسن</h1>
<img src="صور/ismail_photo.jpg" alt="صورة إسماعيل سليمان حسن" width="150">

<h2>كتب الصف الأول الابتدائي</h2>
<div id="books"></div>

<script>
fetch('books.json')
.then(response => response.json())
.then(data => {
    const container = document.getElementById('books');
    data.forEach(book => {
        if(book.مرحلة === "ابتدائي" && book.صف === "الأول") {
            const div = document.createElement('div');
            div.className = 'book';
            div.innerHTML = `
                <p>${book.مادة} - ${book.نوع} (${book.سنة})</p>
                <a href="${book.رابط}" target="_blank">تحميل الكتاب</a>
            `;
            container.appendChild(div);
        }
    });
});
</script>

</body>
</html>
