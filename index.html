<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مكتبة إسماعيل سليمان حسن</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background-color: #eef2f7;
            text-align: center;
            padding: 20px;
        }
        h1, h2 {
            color: #0d6efd;
        }
        img {
            border-radius: 50%;
            margin: 20px 0;
        }
        .book {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        a {
            text-decoration: none;
            color: green;
            font-weight: bold;
        }
        select {
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>مرحبًا بكم في مكتبة إسماعيل سليمان حسن</h1>
<img src="images/ismail_photo.jpg" alt="صورة إسماعيل سليمان حسن" width="150">

<h2>اختر المرحلة التعليمية:</h2>
<select id="stageSelect">
    <option value="ابتدائي">ابتدائي</option>
    <option value="متوسط">متوسط</option>
</select>

<h2>اختر الصف:</h2>
<select id="gradeSelect"></select>

<div id="books"></div>

<script>
// تعريف الصفوف لكل مرحلة
const grades = {
    "ابتدائي": ["الأول","الثاني","الثالث","الرابع","الخامس","السادس"],
    "متوسط": ["السابع","الثامن","التاسع"]
};

const stageSelect = document.getElementById('stageSelect');
const gradeSelect = document.getElementById('gradeSelect');
const container = document.getElementById('books');

// تحديث قائمة الصفوف عند اختيار المرحلة
function updateGrades() {
    gradeSelect.innerHTML = '';
    const stage = stageSelect.value;
    grades[stage].forEach(grade => {
        const option = document.createElement('option');
        option.value = grade;
        option.textContent = grade;
        gradeSelect.appendChild(option);
    });
    displayBooks();
}

// عرض الكتب حسب المرحلة والصف
function displayBooks() {
    container.innerHTML = '';
    fetch('books.json')
    .then(response => response.json())
    .then(data => {
        const stage = stageSelect.value;
        const grade = gradeSelect.value;
        const filtered = data.filter(book => book.مرحلة === stage && book.صف === grade);
        if(filtered.length === 0){
            container.innerHTML = '<p>لا توجد كتب لهذا الصف حتى الآن.</p>';
            return;
        }
        filtered.forEach(book => {
            const div = document.createElement('div');
            div.className = 'book';
            div.innerHTML = `<p>${book.مادة} - ${book.نوع} (${book.سنة})</p>
                             <a href="${book.رابط}" target="_blank">تحميل الكتاب</a>`;
            container.appendChild(div);
        });
    });
}

// أحداث تغيير القوائم
stageSelect.addEventListener('change', updateGrades);
gradeSelect.addEventListener('change', displayBooks);

// تهيئة القوائم
updateGrades();

</script>

</body>
</html>
