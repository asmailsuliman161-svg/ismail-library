<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتبة إسماعيل سليمان حسن - احترافية</title>
<style>
/* ===== CSS المكتبة ===== */
body {
    font-family: Tahoma, sans-serif;
    background-color: #f0f4f8;
    margin: 0;
    padding: 20px;
    text-align: center;
}
h1 { color: #0d6efd; margin-bottom: 5px; }
h2 { color: #0d6efd; margin-top: 5px; }
img { border-radius: 50%; margin: 20px 0; border: 3px solid #0d6efd; }
p.description { max-width: 700px; margin: 10px auto; font-size: 16px; color: #333; }
select { padding: 8px 12px; margin: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
.filter-container { margin: 20px 0; }
.books-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
.book {
    background: white;
    width: 220px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.book:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.25); }
.book p { font-weight: bold; margin: 10px 0; color: #333; }
.book a {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 12px;
    background-color: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: background 0.2s;
}
.book a:hover { background-color: #084298; }
.ابتدائي { border-top: 4px solid #5bc0de; }
.متوسط { border-top: 4px solid #28a745; }
.ثانوي { border-top: 4px solid #fd7e14; }
.subject-select { padding: 6px 10px; margin-top: 10px; font-size: 14px; border-radius: 5px; }
@media(max-width: 600px){ .books-container { flex-direction: column; align-items: center; } .book { width: 90%; } }

/* ===== CSS شاشة البداية ===== */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: background 0.5s ease;
}
#splash img {
    width: 120px;
    margin-bottom: 20px;
    animation: zoom-rotate 1.5s infinite alternate;
}
#splash h2 { margin: 10px 0; font-size: 22px; text-align: center; }
#splash p { font-size: 16px; opacity: 0.9; margin: 5px 0; text-align: center; }
#countdown {
    font-size: 36px;
    font-weight: bold;
    margin-top: 10px;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
}
.zoom-number { animation: pulse 0.5s ease; }
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.7); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
}
@keyframes zoom-rotate {
    from { transform: scale(1) rotate(0deg); }
    to { transform: scale(1.15) rotate(10deg); }
}
</style>
</head>
<body>

<!-- ===== شاشة البداية الاحترافية ===== -->
<div id="splash">
    <img src="logo.png" alt="Logo">
    <h2>مكتبة إسماعيل التعليمية</h2>
    <p>📚 جاري تحميل المكتبة...</p>
    <p id="countdown">5</p>
</div>

<!-- ===== محتوى المكتبة ===== -->
<h1><img src="logo.png" style="width:120px; margin-top:20px;"></h1>
<h1>مكتبة إسماعيل التعليمية</h1>
<img src="images/ismail_photo.jpg" alt="صورة إسماعيل سليمان حسن" width="150">
<p class="description">
مكتبة إلكترونية شاملة تهدف إلى خدمة الطالب السوداني، وتسهيل الوصول إلى الكتب المدرسية لجميع المراحل والصفوف من الابتدائي وحتى الثانوي، مع تصفح سهل وتحميل مباشر للكتب.
</p>
<div class="filter-container">
    <label>اختر المرحلة:</label>
    <select id="stageSelect">
        <option value="">-- اختر المرحلة --</option>
        <option value="ابتدائي">ابتدائي</option>
        <option value="متوسط">متوسط</option>
        <option value="ثانوي">ثانوي</option>
    </select>
    <label>اختر الصف:</label>
    <select id="gradeSelect">
        <option value="">-- اختر الصف --</option>
    </select>
    <label>اختر المادة:</label>
    <select id="subjectSelect" class="subject-select">
        <option value="">-- كل المواد --</option>
    </select>
</div>
<div class="books-container" id="books"></div>

<script>
// ===== عد تنازلي للشاشة مع صوت تيك =====
const tickSound = new Audio('tick.mp3'); // ضع ملف tick.mp3 في نفس المجلد
let countdownNum = 5; 
const countdownEl = document.getElementById('countdown');
const splash = document.getElementById('splash');

const interval = setInterval(() => {
    countdownNum--;
    if(countdownNum > 0){
        countdownEl.textContent = countdownNum;
        tickSound.currentTime = 0;
        tickSound.play();
        countdownEl.classList.remove('zoom-number');
        void countdownEl.offsetWidth;
        countdownEl.classList.add('zoom-number');
        splash.style.background = `linear-gradient(${Math.random()*360}deg, #0d6efd, #6610f2)`;
    } else {
        clearInterval(interval);
        splash.style.transition = 'opacity 1s ease';
        splash.style.opacity = 0;
        setTimeout(() => { splash.style.display = 'none'; }, 1000);
    }
}, 1000);

// ===== كود تحميل وعرض الكتب =====
let allData = [];
fetch('books.json')
.then(response => response.json())
.then(data => {
    allData = data;
    const stageSelect = document.getElementById('stageSelect');
    const gradeSelect = document.getElementById('gradeSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const booksDiv = document.getElementById('books');

    function updateGrades() {
        const selectedStage = stageSelect.value;
        gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
        subjectSelect.innerHTML = '<option value="">-- كل المواد --</option>';
        booksDiv.innerHTML = '';
        if (!selectedStage) return;
        const grades = [...new Set(allData.filter(b => b.مرحلة === selectedStage).map(b => b.صف))];
        grades.forEach(g => { const option = document.createElement('option'); option.value = g; option.textContent = g; gradeSelect.appendChild(option); });
    }

    function updateSubjects() {
        const selectedStage = stageSelect.value;
        const selectedGrade = gradeSelect.value;
        subjectSelect.innerHTML = '<option value="">-- كل المواد --</option>';
        booksDiv.innerHTML = '';
        if (!selectedStage || !selectedGrade) return;
        const subjects = [...new Set(allData.filter(b => b.مرحلة === selectedStage && b.صف === selectedGrade).map(b => b.مادة))];
        subjects.forEach(s => { const option = document.createElement('option'); option.value = s; option.textContent = s; subjectSelect.appendChild(option); });
        showBooks();
    }

    function showBooks() {
        const selectedStage = stageSelect.value;
        const selectedGrade = gradeSelect.value;
        const selectedSubject = subjectSelect.value;
        booksDiv.innerHTML = '';
        const filteredBooks = allData.filter(b => b.مرحلة === selectedStage && b.صف === selectedGrade && (selectedSubject ? b.مادة === selectedSubject : true));
        filteredBooks.forEach(book => {
            const div = document.createElement('div');
            div.className = `book ${selectedStage}`;
            div.innerHTML = `<p>${book.مادة} - ${book.نوع} (${book.سنة})</p><a href="${book.رابط}" target="_blank">تحميل الكتاب</a>`;
            booksDiv.appendChild(div);
        });
    }

    stageSelect.addEventListener('change', updateGrades);
    gradeSelect.addEventListener('change', updateSubjects);
    subjectSelect.addEventListener('change', showBooks);
});
</script>
</body>
</html>
