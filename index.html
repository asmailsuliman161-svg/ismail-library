<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مكتبة إسماعيل سليمان حسن</title>
</head>

<body>

<h1>مكتبة إسماعيل سليمان حسن</h1>

<div id="books"></div>

<script>
fetch('books.json')
.then(response => response.json())
.then(data => {

    let container = document.getElementById('books');

    data.forEach(book => {

        let div = document.createElement('div');

        div.innerHTML = `
            <p>${book.مادة} - ${book.نوع}</p>
            <a href="${book.رابط}">تحميل</a>
        `;

        container.appendChild(div);
    });

});
</script>

</body>
</html>
