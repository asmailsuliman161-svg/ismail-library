<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتبة إسماعيل سليمان حسن</title>

<style>
body {
    font-family: Tahoma;
    background: #eef2f7;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #0d6efd;
}

img {
    border-radius: 50%;
    margin: 15px 0;
}

select {
    padding: 10px;
    font-size: 16px;
    margin: 10px;
}

.book {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

a {
    text-decoration: none;
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>مرحبًا بكم في مكتبة إسماعيل سليمان حسن</h1>

<img src="صور/ismail_photo.jpg" width="150">

<h2>اختر الصف:</h2>

<select id="grade">
    <option value="الأول">الأول</option>
    <option value="الثاني">الثاني</option>
    <option value="الثالث">الثالث</option>
    <option value="الرابع">الرابع</option>
    <option value="الخامس">الخامس</option>
    <option value="السادس">السادس</option>
</select>

<div id="books"></div>

<script>
fetch('books.json')
.then(res => res.json())
.then(data => {

    const container = document.getElementById('books');
    const gradeSelect = document.getElementById('grade');

    function showBooks() {
        container.innerHTML = "";

        let grade = gradeSelect.value;

        data.forEach(book => {
            if(book.صف === grade) {

                let div = document.createElement('div');
                div.className = 'book';

                div.innerHTML = `
                    <p>${book.مادة} - ${book.نوع} (${book.سنة})</p>
                    <a href="${book.رابط}" target="_blank">تحميل الكتاب</a>
                `;

                container.appendChild(div);
            }
        });
    }

    gradeSelect.addEventListener("change", showBooks);

    showBooks();
});
</script>

</body>
</html>
