<!DOCTYPE html>
<html lang="ar">
<head>
    <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>مكتبة إسماعيل التعليمية - نسخة نهائية</title>
<link rel="stylesheet" href="style.css">
<style>
/* ===== شاشة البداية ===== */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    text-align: center;
}
#splash img {
    width: 50%;
    max-width: 200px;
    margin-bottom: 20px;
    animation: zoom-rotate 1.5s infinite alternate;
}
#splash h2 { margin: 10px 0; font-size: 28px; }
#splash p { font-size: 18px; opacity: 0.9; }
#countdown {
    font-size: 50px;
    font-weight: bold;
    margin-top: 10px;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
}
@keyframes zoom-rotate {
    from { transform: scale(1) rotate(0deg); }
    to { transform: scale(1.15) rotate(10deg); }
}
body { font-family: Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; }
h1 { color: #0d6efd; margin-bottom: 5px; }
.description { max-width: 800px; margin: 10px auto; font-size: 16px; color: #333; }
.filter-container { margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
select { padding: 8px 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
.books-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
.book { background: white; width: 200px; padding: 10px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
.book:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.25); }
.book img { width: 100px; height: 120px; margin: 0 auto 10px; opacity: 0.9; }
.book p { font-weight: bold; margin: 5px 0; color: #333; font-size: 14px; min-height: 40px; }
.book a { display: inline-block; margin-top: 5px; padding: 6px 10px; background-color: #0d6efd; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; }
.book a:hover { background-color: #084298; }
.ابتدائي { border-top: 4px solid #5bc0de; }
.متوسط { border-top: 4px solid #28a745; }
.ثانوي { border-top: 4px solid #fd7e14; }
@media(max-width: 600px){ .books-container { flex-direction: column; align-items: center; } .book { width: 90%; } }
</style>
</head>
<body>

<!-- شاشة البداية -->
<div id="splash">
    <img src="logo.png" alt="Logo">
    <h2>مكتبة إسماعيل التعليمية</h2>
    <p>📚 جاري تحميل المكتبة...</p>
    <p id="countdown">5</p>
</div>

<h1>مكتبة إسماعيل التعليمية</h1>
<p class="description">
مكتبة إلكترونية شاملة تهدف إلى خدمة الطالب السوداني، مع تصفح سهل وتحميل مباشر للكتب لجميع المراحل.
</p>

<div class="filter-container">
    <select id="stageSelect"><option value="">-- اختر المرحلة --</option></select>
    <select id="gradeSelect"><option value="">-- اختر الصف --</option></select>
    <select id="subjectSelect"><option value="">-- كل المواد --</option></select>
</div>

<div class="books-container" id="books"></div>

<script>
// ===== عداد البداية =====
let countdownNum = 5;
const countdownEl = document.getElementById('countdown');
const splash = document.getElementById('splash');
const interval = setInterval(() => {
    countdownNum--;
    countdownEl.textContent = countdownNum;
    if(countdownNum <= 0){
        clearInterval(interval);
        splash.style.transition = 'opacity 1s ease';
        splash.style.opacity = 0;
        setTimeout(() => { splash.remove(); }, 1000);
    }
}, 1000);

// ===== تحميل وعرض الكتب مع الغلاف الافتراضي =====
let allData = []; 
fetch('books.json')
.then(response => response.json())
.then(data => {
    allData = data;
    const stageSelect = document.getElementById('stageSelect');    
    const gradeSelect = document.getElementById('gradeSelect');    
    const subjectSelect = document.getElementById('subjectSelect');    
    const booksDiv = document.getElementById('books');    

    // ملأ المرحلة
    const stages = [...new Set(allData.map(b => b.مرحلة))];
    stages.forEach(s => { let option = document.createElement('option'); option.value = s; option.textContent = s; stageSelect.appendChild(option); });

    function updateGrades() {
        const selectedStage = stageSelect.value;
        gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
        subjectSelect.innerHTML = '<option value="">-- كل المواد --</option>';
        booksDiv.innerHTML = '';
        if(!selectedStage) return;
        const grades = [...new Set(allData.filter(b => b.مرحلة === selectedStage).map(b => b.صف))];
        grades.forEach(g => { let option = document.createElement('option'); option.value = g; option.textContent = g; gradeSelect.appendChild(option); });
    }

    function updateSubjects() {
        const selectedStage = stageSelect.value;
        const selectedGrade = gradeSelect.value;
        subjectSelect.innerHTML = '<option value="">-- كل المواد --</option>';
        booksDiv.innerHTML = '';
        if(!selectedStage || !selectedGrade) return;
        const subjects = [...new Set(allData.filter(b => b.مرحلة===selectedStage && b.صف===selectedGrade).map(b => b.مادة))];
        subjects.forEach(s => { let option = document.createElement('option'); option.value=s; option.textContent=s; subjectSelect.appendChild(option); });
        showBooks();
    }

    function showBooks() {
        const selectedStage = stageSelect.value;
        const selectedGrade = gradeSelect.value;
        const selectedSubject = subjectSelect.value;
        booksDiv.innerHTML = '';
        const filteredBooks = allData.filter(b => b.مرحلة===selectedStage && b.صف===selectedGrade && (selectedSubject? b.مادة===selectedSubject:true));
        if(filteredBooks.length === 0){
            booksDiv.innerHTML = '<p style="margin-top:20px; color:#666;">لا توجد كتب في هذا الاختيار.</p>';
            return;
        }
        filteredBooks.forEach(book => {
            const div = document.createElement('div');
            div.className = `book ${selectedStage}`;
            const cover = book.غلاف ? book.غلاف : 'images/book_default.png';
            div.innerHTML = `
                <img src="${cover}" alt="${book.مادة}">
                <p>${book.مادة} - ${book.نوع} (${book.سنة})</p>
                <a href="${book.رابط}" target="_blank">تحميل الكتاب</a>
            `;
            booksDiv.appendChild(div);
        });
    }

    stageSelect.addEventListener('change', updateGrades);
    gradeSelect.addEventListener('change', updateSubjects);
    subjectSelect.addEventListener('change', showBooks);
});
</script>
</body>
</html>
