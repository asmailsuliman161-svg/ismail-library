<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتبة إسماعيل سليمان حسن</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Tahoma, sans-serif; background-color: #eef2f7; text-align: center; padding: 20px; }
h1 { color: #0d6efd; }
img { border-radius: 50%; margin: 20px 0; }
.book { background: white; margin: 10px auto; padding: 10px; width: 80%; border-radius: 10px; box-shadow:0 2px 5px rgba(0,0,0,0.2);}
a { text-decoration: none; color: green; font-weight: bold; }
select { padding:5px; font-size:16px; margin-bottom:15px; }
</style>
</head>
<body>

<h1>مرحبًا بكم في مكتبة إسماعيل سليمان حسن</h1>
<img src="صور/ismail_photo.jpg" alt="صورة إسماعيل سليمان حسن" width="150">

<h2>المكتبة الرقمية لجميع المراحل التعليمية</h2>

<label for="stageSelect">اختر المرحلة:</label>
<select id="stageSelect">
  <option value="ابتدائي">ابتدائي</option>
  <option value="متوسط">متوسط</option>
  <option value="ثانوي">ثانوي</option>
</select>

<label for="gradeSelect">اختر الصف:</label>
<select id="gradeSelect"></select>

<div id="books"></div>

<script>
fetch('books.json')
.then(response => response.json())
.then(data => {
    const stageSelect = document.getElementById('stageSelect');
    const gradeSelect = document.getElementById('gradeSelect');
    const container = document.getElementById('books');

    const allGrades = {
        "ابتدائي":["الأول","الثاني","الثالث","الرابع","الخامس","السادس"],
        "متوسط":["السابع","الثامن","التاسع"],
        "ثانوي":["العاشر","الحادي عشر","الثاني عشر"]
    };

    function populateGrades(stage){
        gradeSelect.innerHTML = "";
        allGrades[stage].forEach(g=>{
            let opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            gradeSelect.appendChild(opt);
        });
    }

    function showBooks(stage, grade){
        container.innerHTML = "";
        data.forEach(book=>{
            if(book.مرحلة===stage && book.صف===grade){
                const div = document.createElement('div');
                div.className='book';
                div.innerHTML = `<p>${book.مادة} - ${book.نوع} (${book.سنة})</p>
                                 <a href="${book.رابط}" target="_blank">تحميل الكتاب</a>`;
                container.appendChild(div);
            }
        });
    }

    // عند تحميل الصفحة
    populateGrades('ابتدائي');
    showBooks('ابتدائي','الأول');

    // عند تغيير المرحلة
    stageSelect.addEventListener('change', ()=>{
        populateGrades(stageSelect.value);
        showBooks(stageSelect.value, gradeSelect.value);
    });

    // عند تغيير الصف
    gradeSelect.addEventListener('change', ()=>{
        showBooks(stageSelect.value, gradeSelect.value);
    });
});
</script>

</body>
</html>
